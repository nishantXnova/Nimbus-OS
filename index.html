<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NimbusOS Explorer</title>
    <style>
        body {
            background-color: #0d1117;
            color: #c9d1d9;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        h1 {
            color: #58a6ff;
            margin: 0;
            text-shadow: 0 0 10px rgba(88, 166, 255, 0.3);
        }

        #screen_container {
            background-color: #000;
            padding: 10px;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5), 0 0 20px rgba(88, 166, 255, 0.1);
            border: 1px solid #30363d;
        }

        canvas {
            display: block;
        }

        .status {
            margin-top: 20px;
            font-size: 0.9em;
            color: #8b949e;
        }

        .controls {
            margin-top: 10px;
        }

        button {
            background: #21262d;
            border: 1px solid #30363d;
            color: #c9d1d9;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }

        button:hover {
            background: #30363d;
            border-color: #8b949e;
        }

        #log_container {
            margin-top: 15px;
            width: 640px;
            height: 100px;
            background: #000;
            border: 1px solid #30363d;
            border-radius: 4px;
            padding: 10px;
            font-family: monospace;
            font-size: 12px;
            color: #7ee787;
            overflow-y: auto;
            text-align: left;
        }
    </style>
</head>

<body>
    <div style="display: flex; align-items: center; gap: 20px; margin-bottom: 20px;">
        <img src="logo.png" alt="NimbusOS Logo"
            style="height: 60px; border-radius: 12px; box-shadow: 0 0 20px rgba(88, 166, 255, 0.4);">
        <h1>NimbusOS: The Reactive Core</h1>
    </div>

    <div id="screen_container">
        <canvas id="vga_canvas"></canvas>
    </div>

    <div class="status" id="status_text">Initialising v86...</div>

    <div id="log_container">
        <div>[System] Diagnostics starting...</div>
    </div>

    <div class="controls">
        <button onclick="window.location.reload()">Reset System</button>
    </div>

    <!-- v86 Emulator Library (Local) -->
    <script src="v86/v86_all.js"></script>
    <script>
        function log(msg) {
            var container = document.getElementById("log_container");
            var div = document.createElement("div");
            div.innerText = "[" + new Date().toLocaleTimeString() + "] " + msg;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        window.onload = function () {
            var status = document.getElementById("status_text");
            log("Loading local assets...");

            var emulator = new V86Starter({
                wasm_path: "v86/v86.wasm",
                memory_size: 32 * 1024 * 1024,
                vga_canvas: document.getElementById("vga_canvas"),
                bios: { url: "v86/seabios.bin" },
                vga_bios: { url: "v86/vgabios.bin" },
                fda: { url: "nimbus_os.bin" },
                autostart: true,
            });

            emulator.add_listener("emulator-ready", function () {
                status.innerText = "System Ready. Booting NimbusOS...";
                log("Emulator ready. Jumping to entry point.");
            });

            emulator.add_listener("download-error", function (e) {
                status.innerText = "Error: Asset load failed.";
                status.style.color = "#f85149";
                log("Download Error. Check if nimbus_os.bin and logo.png exist.");
            });

            status.innerText = "Waiting for boot...";
            log("Waiting for v86 to signal ready.");
        };
    </script>
</body>

</html>
